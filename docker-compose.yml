name: barthe

services:
  db:
    image: postgres:16-alpine
    container_name: barthe_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: barthe
      POSTGRES_PASSWORD: barthe_secret
      POSTGRES_DB: barthe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barthe -d barthe"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: barthe_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://barthe:barthe_secret@db:5432/barthe
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-changeme}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRE_MINUTES: 1440
      STORAGE_PATH: /app/uploads
      USE_MOCK: ${USE_MOCK:-true}
    volumes:
      - ./apps/api:/app
      - api_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: barthe_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  postgres_data:
  api_uploads:
